resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80 default_server;
    server_name tenclinic.com.ua www.tenclinic.com.ua _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    server_name tenclinic.com.ua www.tenclinic.com.ua _;
    client_max_body_size 50M;

    ssl_certificate /etc/letsencrypt/live/tenclinic.com.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tenclinic.com.ua/privkey.pem;

    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        set $upstream http://web:8000;
        proxy_pass $upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
        proxy_read_timeout 120s;
    }
}
