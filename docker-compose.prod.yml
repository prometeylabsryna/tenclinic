services:
  db:
    restart: always

  web:
    restart: always

  nginx:
    restart: always
    ports:
      - "${HTTP_PORT:-80}:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/docker.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
