{% for item in items %}
<li class="about-us-section__photo">
  <div class="about-us-section__photo-frame">
    <img
      class="about-us-section__photo-image"
      src="{{ item.url }}"
      alt="TEN Clinic — фото {{ item.index }}"
      width="480"
      height="360"
      loading="lazy"
      decoding="async"
    >
  </div>
</li>
{% endfor %}
