<div class="map-preview">
  {% if site_settings.map_embed_src %}
  <iframe
    src="{{ site_settings.map_embed_src }}"
    title="Карта TEN clinic"
    loading="lazy"
    referrerpolicy="no-referrer-when-downgrade"
    allowfullscreen>
  </iframe>
  {% else %}
  <div class="map-placeholder">
    <span class="map-placeholder__icon" aria-hidden="true">
      <svg width="34" height="34" viewBox="0 0 20 20" fill="none"><path d="M10 17.5s-4.5-3-4.5-6.5a4.5 4.5 0 119 0c0 3.5-4.5 6.5-4.5 6.5z" stroke="currentColor" stroke-width="1.4"/><circle cx="10" cy="11" r="1.5" fill="currentColor"/></svg>
    </span>
    <p>Карта проїзду</p>
  </div>
  {% endif %}
</div>
